<!-- _includes/books.html -->
<div class="grid-sizer"></div>
<div class="grid-item">
  {% if book.redirect -%}
  <a href="{{ book.redirect }}">
    {%- else -%}
    <a href="{{ book.url | relative_url }}">
      {%- endif %}
      <div class="hoverable">
        {%- if book.img %}
        {%- include figure.html
        path=book.img
        alt="book cover"
        title=book.title-%}
        {%- endif %}
        <!-- <div class="card-body">
          <h2 class="card-title text-lowercase">{{ book.title }}</h2>
          <p class="card-text">{{ book.description }}</p>
        </div> -->
      </div>
    </a>
</div>
